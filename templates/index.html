<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dispatch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div id="toast-container"></div>
    <div class="app">
      <header class="topbar">
        <div class="topbar-left">
          <button class="topbar-icon" id="btn-menu" title="Toggle sidebar">
            <span class="material-symbols-rounded">menu</span>
          </button>
          <span class="material-symbols-rounded topbar-ai-icon">auto_awesome</span>
          <span class="topbar-app-name">Dispatch</span>
        </div>
        <div class="topbar-center">
          <div class="search-bar">
            <span class="material-symbols-rounded search-ico">search</span>
            <input
              type="text"
              id="search-input"
              placeholder="Search emails"
              autocomplete="off"
            />
            <button id="search-clear" class="search-clear hidden" title="Clear">
              <span class="material-symbols-rounded">close</span>
            </button>
          </div>
        </div>
        <div class="topbar-right">
          <span class="fetch-info" id="fetch-info"></span>
          <div class="llm-picker-topbar">
            <span class="material-symbols-rounded llm-ico">smart_toy</span>
            <select id="llm-select" title="AI engine">
              <option value="qwen_local_3b">3B Local</option>
              <option value="qwen_local_7b">7B Local</option>
              <option value="groq">Cloud</option>
            </select>
          </div>
          <button class="topbar-icon" id="btn-refresh" title="Fetch inbox">
            <span class="material-symbols-rounded fetch-icon"
              >move_to_inbox</span
            >
          </button>
          <button class="topbar-icon" id="btn-theme" title="Toggle theme">
            <span class="material-symbols-rounded" id="theme-icon"
              >dark_mode</span
            >
          </button>
          <button class="auth-btn" id="btn-auth">
            <span class="material-symbols-rounded">account_circle</span>
            <span id="auth-label">Sign in</span>
          </button>
        </div>
      </header>
      <div class="app-body" id="app-body">
        <aside class="sidebar" id="sidebar">
          <button class="compose-btn" id="btn-compose">
            <span class="material-symbols-rounded">edit</span>
            <span class="compose-label">Compose</span>
          </button>
          <nav class="sidebar-nav" id="sidebar-nav">
            <button class="nav-item active" data-view="inbox">
              <span class="material-symbols-rounded nav-ico">inbox</span>
              <span class="nav-text">Inbox</span>
              <span class="nav-badge" id="inbox-badge"></span>
            </button>
            <button class="nav-item" data-view="todo">
              <span class="material-symbols-rounded nav-ico">task_alt</span>
              <span class="nav-text">Todo</span>
            </button>
            <button class="nav-item" data-view="meetings">
              <span class="material-symbols-rounded nav-ico">event</span>
              <span class="nav-text">Meetings</span>
            </button>
            <button class="nav-item" data-view="labels">
              <span class="material-symbols-rounded nav-ico">label</span>
              <span class="nav-text">Labels</span>
            </button>
          </nav>
        </aside>
        <section class="list-pane" id="list-pane"></section>
        <section class="detail-pane" id="detail-pane"></section>
      </div>
      <div class="compose-float hidden" id="compose-float">
        <div class="compose-float-header" id="compose-float-header">
          <span class="compose-float-title" id="compose-float-title"
            >New Message</span
          >
          <div class="compose-float-controls">
            <button
              class="compose-float-btn"
              id="compose-float-minimize"
              title="Minimize"
            >
              <span class="material-symbols-rounded">minimize</span>
            </button>
            <button
              class="compose-float-btn"
              id="compose-float-expand"
              title="Expand"
            >
              <span class="material-symbols-rounded">open_in_full</span>
            </button>
            <button
              class="compose-float-btn"
              id="compose-float-close"
              title="Close"
            >
              <span class="material-symbols-rounded">close</span>
            </button>
          </div>
        </div>
        <div class="compose-float-body" id="compose-float-body"></div>
      </div>
    </div>
    <script src="/static/js/app.js"></script>
  </body>
</html>
